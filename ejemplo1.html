<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene> 
      <a-assets><video id="mivideo" src="video.mp4" autoplay loop></video></a-assets>
      <a-video src="#mivideo" width="4" height="3.25" position="0 2 -4"></a-video>

            <a-box position="-1 0.5 -3" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
       <a-box position="-1.25 0.5 -3" rotation="0 75 0" color="#4BB3D9"></a-box>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky color="#ECECEC"></a-sky>
      <a-light type="ambient" color="#ffffff" intensity="1"
               position="0 4 -3" angle="30" penumbra="0.5"
               ></a-light><a-sound src="sonido_comedor.mp3" on="click" loop="true" volume="0.6"></a-sound>
    </a-scene>
  </body>
</html>
